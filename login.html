<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintrack Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="login-page">
            <section class="login-card">
                <div class="welcome-txt"><h3>Welcome Back</h3>
                <h4>Login to FinTrack Pro</h4></div>
            <form id="login">
                
                <label for="username">Username</label>
                <input type="text" name="Username" id="username" required>
                <label for="password">Password</label>
                <input type="password" id="password" required>
                <button class="login-btn btn">Login</button>
                
            </form>
            <div class="txt"><span> Don't have an account?</span>
                <a href="register.html">Register here</a></div>
        </section>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
